name: Pages

on:
  workflow_dispatch:
    inputs:
      deployment:
        description: Deployment config slug to build
        required: false
        default: app.bringa.io

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static app
    runs-on: ubuntu-latest
    env:
      BRINGA_DEPLOYMENT: ${{ inputs.deployment || 'app.bringa.io' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static app
        run: pnpm build

      - name: Setup Pages
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/deploy/') }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/deploy/') }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    name: Deploy GitHub Pages app
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/deploy/') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
