name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Secret-free quality checks
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: dummy-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated config
        run: pnpm check:config

      - name: Test config layering
        run: pnpm test:config

      - name: Test env example checker
        run: pnpm test:env-example

      - name: Test copy checker
        run: pnpm test:copy

      - name: Test docs index checker
        run: pnpm test:docs-index

      - name: Test release checklist checker
        run: pnpm test:release-checklist

      - name: Test GitHub workflow checker
        run: pnpm test:github-workflows

      - name: Test dashboard item query filters
        run: pnpm test:dashboard-query

      - name: Test user item visibility requests
        run: pnpm test:item-visibility-request

      - name: Test issue prompt rendering
        run: pnpm test:issue-prompt

      - name: Test admin notification settings
        run: pnpm test:admin-notification-settings

      - name: Test admin deletion request summary
        run: pnpm test:admin-deletion-requests

      - name: Test admin moderation review notes
        run: pnpm test:admin-moderation-review

      - name: Test admin profile validation
        run: pnpm test:admin-profile-validation

      - name: Test admin queue counts
        run: pnpm test:admin-queue-counts

      - name: Test admin recent activity
        run: pnpm test:admin-recent-activity

      - name: Test admin system health
        run: pnpm test:admin-system-health

      - name: Test admin user item grouping
        run: pnpm test:admin-user-items

      - name: Test admin item versions
        run: pnpm test:admin-item-versions

      - name: Test admin visibility queue
        run: pnpm test:admin-visibility-queue

      - name: Test Supabase backup helpers
        run: pnpm test:backup-supabase

      - name: Test Supabase backup verifier
        run: pnpm test:verify-backup

      - name: Test PWA manifest
        run: pnpm test:pwa-manifest

      - name: Check env example
        run: pnpm check:env-example

      - name: Check English documentation copy
        run: pnpm check:copy

      - name: Check docs index
        run: pnpm check:docs-index

      - name: Check release checklist
        run: pnpm check:release-checklist

      - name: Check GitHub workflows
        run: pnpm check:github-workflows

      - name: Test static export checker
        run: pnpm test:static-export

      - name: Check static export contract
        run: pnpm check:static-export

      - name: Check Supabase contract
        run: pnpm check:supabase-contract

      - name: Lint
        run: pnpm lint

      - name: TypeScript
        run: pnpm exec tsc --noEmit

      - name: Static build
        run: pnpm build
